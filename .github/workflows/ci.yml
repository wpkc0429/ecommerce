name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API (lint + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ecommerce
          POSTGRES_PASSWORD: ecommerce
          POSTGRES_DB: ecommerce
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ecommerce"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      DATABASE_URL: postgres://ecommerce:ecommerce@localhost:5432/ecommerce?sslmode=disable
      TEST_DATABASE_URL: postgres://ecommerce:ecommerce@localhost:5432/ecommerce_test?sslmode=disable
      REDIS_ADDR: localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum
      - name: Create test database
        run: |
          PGPASSWORD=ecommerce psql -h localhost -U ecommerce -d ecommerce -c "CREATE DATABASE ecommerce_test;"
      - name: Build
        working-directory: api
        run: go build ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          working-directory: api
      - name: Unit + integration tests
        working-directory: api
        run: INTEGRATION=1 go test -p 1 -count=1 ./...

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Generated types are current
        working-directory: web
        run: |
          npm run gen:types
          git diff --exit-code themes/starter/schema-types.ts
      - name: Build (includes type checking)
        working-directory: web
        run: npm run build
